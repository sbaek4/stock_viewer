name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install workspace deps (including devDependencies)
        run: npm ci --include=dev

      - name: Backend typecheck and tests
        run: npm run typecheck -w backend && npm run test -w backend

      - name: Frontend lint, test, build
        run: npm run lint -w frontend && npm run test -w frontend && npm run build -w frontend
